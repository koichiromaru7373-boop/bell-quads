<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#123420" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Bell Quads ｜ スタッフ＆マイページ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
:root{
  --felt:#1a472a; --felt-d:#0f3320; --felt-l:#236b43; --line:#2c7a4e;
  --gold:#f4d03f; --gold-d:#cda82b; --cream:#fdfaf0; --dim:#bcd3c4;
  --ink:#0a2417; --red:#e05b4a; --ok:#3ec97a;
  --shadow:0 12px 34px rgba(0,0,0,.4); --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:"Noto Sans JP",system-ui,sans-serif;color:var(--cream);line-height:1.7;
  background:radial-gradient(900px 500px at 50% -10%, #2a7d4e 0%, transparent 60%), var(--felt);min-height:100dvh}
.app{width:min(520px,100%);margin-inline:auto;min-height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.pad{padding:1.1rem}
a{color:inherit}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.1rem;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(15,51,32,.95);backdrop-filter:blur(8px);z-index:20}
.brand{display:flex;align-items:center;gap:.6rem}
.brand .mk{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:linear-gradient(145deg,var(--gold),var(--gold-d));color:var(--ink);font-family:"Playfair Display",serif;font-weight:900}
.brand b{font-family:"Playfair Display",serif}
.brand small{display:block;font-size:.55rem;letter-spacing:.28em;color:var(--gold);font-weight:700}
.link{font-size:.8rem;color:var(--dim)}
.screen{display:none;flex:1;flex-direction:column}
.screen.active{display:flex}
.h{font-family:"Playfair Display",serif;font-weight:900}
.eyebrow{font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700}
.panel{background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:var(--r)}
label.fld{display:block;margin-top:.9rem;font-size:.84rem;color:var(--dim);font-weight:500}
input,select,textarea{width:100%;margin-top:.35rem;padding:.8rem .9rem;border-radius:11px;border:1px solid var(--line);background:rgba(0,0,0,.25);color:var(--cream);font-size:1rem;font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder{color:#7fa28d}
.btn{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;border:none;cursor:pointer;font-weight:700;font-size:1rem;padding:.9rem 1rem;border-radius:999px;font-family:inherit;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn-gold{background:linear-gradient(145deg,var(--gold),var(--gold-d));color:var(--ink)}
.btn-ghost{background:transparent;color:var(--cream);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:var(--red);color:#fff}
.btn-ok{background:var(--ok);color:#063}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-top:1rem}
.msg{margin-top:.8rem;font-size:.88rem;text-align:center;min-height:1.1em}
.msg.err{color:#ffb4a8}.msg.ok{color:var(--gold)}
.center{text-align:center}.tiny{font-size:.78rem;color:var(--dim)}
.divider{height:1px;background:var(--line);margin:1.2rem 0}
.hero{text-align:center;padding:1.8rem 0 1rem}
.hero .mk{width:74px;height:74px;border-radius:18px;margin:0 auto 1rem;display:grid;place-items:center;background:linear-gradient(145deg,var(--gold),var(--gold-d));color:var(--ink);font-family:"Playfair Display",serif;font-weight:900;font-size:2.2rem}
.hero h1{font-family:"Playfair Display",serif;font-size:1.7rem}
.hero p{color:var(--dim);font-size:.9rem}
.suit{display:flex;gap:1rem;justify-content:center;color:var(--gold);margin:.7rem 0}
.staff-entry{text-align:center;margin-top:1.4rem}
.staff-entry button{background:none;border:none;color:var(--dim);font-size:.82rem;text-decoration:underline;cursor:pointer;font-family:inherit}
.mcard{border-radius:18px;padding:1.4rem;background:linear-gradient(135deg,var(--felt-l),var(--felt-d));border:1px solid var(--gold);box-shadow:var(--shadow);position:relative;overflow:hidden}
.mcard::after{content:"♠♥♦♣";position:absolute;right:-6px;bottom:-20px;font-size:4rem;opacity:.08;color:var(--gold)}
.mcard .nm{font-size:1.15rem;font-weight:700}
.mcard .nm small{display:block;font-size:.62rem;letter-spacing:.2em;color:var(--gold);font-weight:700}
.bal{margin-top:1.1rem}
.bal .lab{font-size:.72rem;color:var(--gold);letter-spacing:.1em;font-weight:700}
.bal .val{font-family:"Playfair Display",serif;font-size:2.6rem;font-weight:900;line-height:1}
.bal .val small{font-size:.9rem;color:var(--dim);font-weight:500;font-family:"Noto Sans JP"}
.expire{margin-top:.8rem;font-size:.82rem;color:var(--cream);background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:10px;padding:.55rem .8rem}
.expire b{color:var(--gold)}
.qrbox{display:inline-block;background:#fff;padding:12px;border-radius:14px;margin-top:.5rem}
.hist h3{font-size:.95rem;color:var(--gold);margin:1.2rem 0 .5rem}
.hrow{display:flex;align-items:center;justify-content:space-between;padding:.7rem .9rem;border-radius:11px;background:rgba(0,0,0,.2);border:1px solid var(--line);margin-bottom:.5rem}
.tag{font-size:.7rem;font-weight:700;padding:.2rem .55rem;border-radius:999px}
.tag.in{background:rgba(62,201,122,.18);color:#86f0ad;border:1px solid var(--ok)}
.tag.out{background:rgba(224,91,74,.18);color:#ffb4a8;border:1px solid var(--red)}
.hrow .amt{font-family:"Playfair Display",serif;font-weight:900}
.amt.in{color:#86f0ad}.amt.out{color:#ffb4a8}
.empty{color:var(--dim);text-align:center;padding:1.1rem;font-size:.88rem}
.staffbar{display:flex;align-items:center;gap:.6rem;padding:.7rem 1.1rem;background:rgba(0,0,0,.25);border-bottom:1px solid var(--line)}
.staffbar label{font-size:.75rem;color:var(--gold);font-weight:700;white-space:nowrap}
.staffbar select{margin:0;flex:1;padding:.55rem .7rem}
.tabs{display:flex;gap:.4rem;margin:1rem 1.1rem .2rem}
.tab{flex:1;padding:.7rem;border-radius:12px 12px 0 0;border:1px solid var(--line);border-bottom:none;background:rgba(0,0,0,.2);color:var(--dim);font-weight:700;cursor:pointer;font-family:inherit;font-size:.9rem}
.tab.active{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.tpanel{display:none;flex:1;flex-direction:column}
.tpanel.active{display:flex}
.count-pill{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--felt-l),var(--felt-d));border:1px solid var(--gold);border-radius:14px;padding:.8rem 1.1rem;margin-bottom:1rem}
.count-pill .n{font-family:"Playfair Display",serif;font-weight:900;font-size:2rem;color:var(--gold);line-height:1}
.count-pill .t{font-size:.78rem;color:var(--dim)}
.plist .prow{display:flex;align-items:center;gap:.7rem;padding:.9rem 1rem;border-radius:12px;background:rgba(0,0,0,.2);border:1px solid var(--line);margin-bottom:.6rem;cursor:pointer}
.plist .prow:hover{border-color:var(--gold)}
.plist .prow .pn{font-weight:700;flex:1;min-width:0}
.plist .prow .pn small{display:block;font-size:.7rem;color:var(--dim);font-weight:400}
.plist .prow .pt{font-family:"Playfair Display",serif;font-weight:900;color:var(--gold)}
.scanwrap{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#000;aspect-ratio:1/1;margin-bottom:1rem}
#scanVideo{width:100%;height:100%;object-fit:cover}
#scanCanvas{display:none}
.scanframe::before{content:"";position:absolute;inset:18%;border:3px solid var(--gold);border-radius:14px;box-shadow:0 0 0 9999px rgba(0,0,0,.35)}
.scanstat{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:.8rem;text-align:center;font-size:.88rem}
.tabhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.tabhead .who{font-size:1.25rem;font-weight:700}
.tabhead .who small{display:block;font-size:.7rem;color:var(--dim);font-weight:400}
.orow{display:flex;align-items:center;gap:.6rem;padding:.65rem .8rem;border-radius:10px;background:rgba(0,0,0,.2);border:1px solid var(--line);margin-bottom:.5rem}
.orow .on{flex:1;min-width:0}
.orow .on small{display:block;font-size:.68rem;color:var(--dim)}
.orow .op{font-weight:700;color:var(--gold);white-space:nowrap}
.orow .od{width:30px;height:30px;border-radius:8px;border:none;background:rgba(224,91,74,.85);color:#fff;font-weight:900;cursor:pointer;flex:none}
.menugrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.4rem}
.mbtn{padding:.8rem .6rem;border-radius:12px;border:1px solid var(--line);background:rgba(244,208,63,.1);color:var(--cream);font-weight:700;cursor:pointer;font-family:inherit;text-align:left;font-size:.9rem}
.mbtn:active{transform:scale(.97)}
.mbtn b{display:block;color:var(--gold);font-family:"Playfair Display",serif;font-size:1rem;margin-top:.2rem}
.totbar{display:flex;align-items:baseline;justify-content:space-between;margin:1rem 0;padding-top:.8rem;border-top:1px dashed var(--line)}
.totbar .tl{font-size:.85rem;color:var(--dim)}
.totbar .tv{font-family:"Playfair Display",serif;font-weight:900;font-size:2rem;color:var(--gold)}
.sumline{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--line);font-size:.95rem}
.sumline.big{font-size:1.15rem;font-weight:700}
.sumline .g{color:var(--gold);font-family:"Playfair Display",serif;font-weight:900}
.mitem{display:flex;align-items:center;gap:.6rem;padding:.7rem .9rem;border-radius:11px;background:rgba(0,0,0,.2);border:1px solid var(--line);margin-bottom:.5rem}
.mitem .mn{flex:1;font-weight:700}
.mitem .mp{color:var(--gold);font-weight:700}
.mitem .mini{padding:.4rem .7rem;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--cream);font-weight:700;font-size:.78rem;cursor:pointer;font-family:inherit}
.mitem .mini.del:hover{border-color:var(--red);color:#ffb4a8}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a class="brand" href="index.html"><span class="mk">Q</span><span><b>Bell Quads</b><small>STAFF / MY PAGE</small></span></a>
    <a class="link" href="index.html">← 公式サイト</a>
  </div>

  <section id="screen-login" class="screen active">
    <div class="pad">
      <div class="hero">
        <div class="mk">Q</div><h1>マイページ ログイン</h1>
        <p>お名前と4桁のPINでログイン</p>
        <div class="suit"><span>♠</span><span style="color:var(--red)">♥</span><span style="color:var(--red)">♦</span><span>♣</span></div>
      </div>
      <div class="panel pad">
        <label class="fld" for="loginName">お名前</label>
        <input id="loginName" type="text" placeholder="お名前" autocomplete="off" />
        <label class="fld" for="loginPin">PIN（4桁）</label>
        <input id="loginPin" type="password" inputmode="numeric" maxlength="6" placeholder="••••" autocomplete="off" />
        <div style="margin-top:1.2rem"><button class="btn btn-gold" id="btnLogin">ログイン</button></div>
        <div class="msg" id="loginMsg"></div>
      </div>
      <div class="staff-entry"><button id="btnStaffOpen">店舗スタッフの方はこちら</button></div>
    </div>
  </section>

  <section id="screen-member" class="screen">
    <div class="pad">
      <div class="mcard">
        <div class="nm"><small>MEMBER</small><span id="mName">—</span></div>
        <div class="bal"><div class="lab">有効マイル残高</div><div class="val"><span id="mMiles">0</span><small> pt</small></div></div>
        <div class="expire" id="mExpire" style="display:none"></div>
      </div>
      <div class="center" style="margin-top:1.1rem">
        <div class="eyebrow">店頭でこのQRを提示</div>
        <div class="qrbox" id="qrBox"></div>
      </div>
      <div class="hist">
        <h3>♠ 最近の履歴</h3>
        <div id="histList"><div class="empty">読み込み中…</div></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="btnRefresh">更新</button>
        <button class="btn btn-red" id="btnLogout">ログアウト</button>
      </div>
    </div>
  </section>

  <section id="screen-staffpin" class="screen">
    <div class="pad">
      <div class="hero"><div class="mk" style="background:linear-gradient(145deg,#e0a93f,#b87f25)">S</div><h1>スタッフモード</h1><p>マスターPINを入力</p></div>
      <div class="panel pad">
        <label class="fld" for="staffPin">マスターPIN</label>
        <input id="staffPin" type="password" inputmode="numeric" maxlength="8" placeholder="••••" autocomplete="off" />
        <div style="margin-top:1.2rem"><button class="btn btn-gold" id="btnStaffEnter">入室</button></div>
        <div class="msg" id="staffPinMsg"></div>
        <div class="divider"></div>
        <button class="btn btn-ghost" id="btnStaffBack">戻る</button>
      </div>
    </div>
  </section>

  <section id="screen-staff" class="screen">
    <div class="staffbar">
      <label for="staffSel">操作スタッフ</label>
      <select id="staffSel"><option value="">選択してください</option></select>
      <button class="btn btn-ghost" style="width:auto;padding:.45rem .8rem;font-size:.8rem" id="btnStaffExit">退室</button>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabActive">プレイ中</button>
      <button class="tab" id="tabMenu">メニュー管理</button>
    </div>

    <div class="tpanel active" id="panel-active">
      <div class="pad">
        <div id="viewList">
          <div class="count-pill"><div><div class="t">現在のプレイ人数</div><div class="n"><span id="activeCount">0</span> 人</div></div>
            <button class="btn btn-gold" style="width:auto;padding:.6rem 1rem" id="btnScanOpen">＋ QRで追加</button></div>
          <div class="plist" id="activeList"><div class="empty">読み込み中…</div></div>
        </div>

        <div id="viewScan" style="display:none">
          <div class="scanwrap"><video id="scanVideo" playsinline muted></video><canvas id="scanCanvas"></canvas><div class="scanframe"></div><div class="scanstat" id="scanStat">カメラ起動中…</div></div>
          <button class="btn btn-ghost" id="btnScanBack">一覧へ戻る</button>
        </div>

        <div id="viewTab" style="display:none">
          <div class="tabhead"><div class="who" id="tabWho">—</div>
            <button class="btn btn-ghost" style="width:auto;padding:.5rem .9rem;font-size:.85rem" id="btnTabBack">戻る</button></div>
          <div class="eyebrow" style="margin:.6rem 0 .4rem">伝票（注文）</div>
          <div id="orderList"><div class="empty">注文はまだありません</div></div>
          <div class="totbar"><span class="tl">小計</span><span class="tv">¥<span id="tabTotal">0</span></span></div>
          <div class="eyebrow" style="margin:.4rem 0">メニュー（タップで追加）</div>
          <div class="menugrid" id="menuGrid"></div>
          <div class="btn-row">
            <button class="btn btn-ghost" id="btnCharge">マイル付与</button>
            <button class="btn btn-gold" id="btnSettle">精算する</button>
          </div>
          <div class="msg" id="tabMsg"></div>
        </div>

        <div id="viewSettle" style="display:none">
          <div class="tabhead"><div class="who" id="setWho">—</div>
            <button class="btn btn-ghost" style="width:auto;padding:.5rem .9rem;font-size:.85rem" id="btnSetBack">戻る</button></div>
          <div class="panel pad" style="margin-top:.6rem">
            <div class="sumline big"><span>伝票合計</span><span class="g">¥<span id="setTotal">0</span></span></div>
            <div class="sumline"><span>有効マイル残高</span><span class="g"><span id="setValid">0</span> pt</span></div>
            <label class="fld" for="setMiles">使用マイル</label>
            <input id="setMiles" type="number" inputmode="numeric" min="0" value="0" />
            <label class="fld" for="setCash">現金支払額（不足分）</label>
            <input id="setCash" type="number" inputmode="numeric" min="0" value="0" />
            <div class="btn-row">
              <button class="btn btn-ghost" id="btnSetCancel">やめる</button>
              <button class="btn btn-ok" id="btnSetConfirm">決済を完了</button>
            </div>
            <div class="msg" id="setMsg"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="tpanel" id="panel-menu">
      <div class="pad">
        <div id="menuList"><div class="empty">読み込み中…</div></div>
        <div class="panel pad" style="margin-top:.8rem">
          <div class="eyebrow" id="miFormTitle">メニューを追加</div>
          <label class="fld" for="miName">メニュー名</label>
          <input id="miName" type="text" maxlength="30" placeholder="例）リエントリー" />
          <label class="fld" for="miPrice">金額（円）</label>
          <input id="miPrice" type="number" inputmode="numeric" min="0" placeholder="例）1500" />
          <div class="btn-row">
            <button class="btn btn-ghost" id="miCancel">クリア</button>
            <button class="btn btn-gold" id="miSave">保存</button>
          </div>
          <div class="msg" id="miMsg"></div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
/* ===== Supabase 設定 ===== */
const SUPABASE_URL      = "https://dnnctulubrawypwgwgdo.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_B54zNDjXmwfxfBLfhpBuBQ_ZVwFtN1M";
const MASTER_PIN        = "202046";
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const LS_USER = "bq_user_id";
const LS_STAFF = "bq_staff_name";
const esc = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const yen = n => Number(n||0).toLocaleString();
const setMsg=(el,t,c)=>{el.textContent=t||"";el.className="msg"+(c?" "+c:"");};
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");if(id!=="screen-staff")stopScanner();}

/* ===== ログイン ===== */
const loginMsg=document.getElementById("loginMsg");
document.getElementById("btnLogin").addEventListener("click",doLogin);
document.getElementById("loginPin").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
async function doLogin(){
  const name=document.getElementById("loginName").value.trim();
  const pin=document.getElementById("loginPin").value.trim();
  if(!name||!pin){setMsg(loginMsg,"お名前とPINを入力してください","err");return;}
  setMsg(loginMsg,"確認中…","");
  try{
    const {data,error}=await db.from("users").select("*").eq("name",name).eq("pin",pin).limit(1);
    if(error)throw error;
    if(!data||!data.length){setMsg(loginMsg,"お名前またはPINが一致しません","err");return;}
    localStorage.setItem(LS_USER,data[0].id);setMsg(loginMsg,"","");document.getElementById("loginPin").value="";
    enterMember(data[0]);
  }catch(e){console.error(e);setMsg(loginMsg,"接続エラー：設定をご確認ください","err");}
}

/* ===== マイページ ===== */
let qrInst=null;
async function enterMember(u){
  showScreen("screen-member");
  document.getElementById("mName").textContent=u.name;
  const box=document.getElementById("qrBox");box.innerHTML="";
  qrInst=new QRCode(box,{text:String(u.id),width:170,height:170,colorDark:"#0f3320",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M});
  await loadMile(u.id); await loadHist(u.id);
}
async function loadMile(id){
  try{
    const {data,error}=await db.rpc("mile_summary",{p_user:id});
    if(error)throw error;
    const r=(data&&data[0])||{valid:0,next_amount:0,next_date:null};
    document.getElementById("mMiles").textContent=yen(r.valid);
    const ex=document.getElementById("mExpire");
    if(r.next_date&&r.next_amount>0){
      const d=new Date(r.next_date+"T00:00:00");
      ex.style.display="block";
      ex.innerHTML="まもなく失効：<b>"+yen(r.next_amount)+" pt</b>（"+(d.getMonth()+1)+"月"+d.getDate()+"日）";
    }else ex.style.display="none";
  }catch(e){console.error(e);document.getElementById("mMiles").textContent="—";}
}
async function loadHist(id){
  const w=document.getElementById("histList");
  try{
    const {data,error}=await db.from("history").select("*").eq("user_id",id).order("created_at",{ascending:false}).limit(8);
    if(error)throw error;
    if(!data||!data.length){w.innerHTML='<div class="empty">まだ履歴がありません</div>';return;}
    w.innerHTML=data.map(h=>{const isIn=h.action==="チャージ";const d=new Date(h.created_at);
      const dt=(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
      return '<div class="hrow"><div style="display:flex;gap:.6rem;align-items:center"><span class="tag '+(isIn?"in":"out")+'">'+esc(h.action)+'</span><span class="tiny">'+dt+(h.staff_name?" ・"+esc(h.staff_name):"")+'</span></div><span class="amt '+(isIn?"in":"out")+'">'+(isIn?"+":"-")+yen(h.amount)+'</span></div>';
    }).join("");
  }catch(e){console.error(e);w.innerHTML='<div class="empty">読み込み失敗</div>';}
}
document.getElementById("btnRefresh").addEventListener("click",async()=>{const id=localStorage.getItem(LS_USER);if(id){await loadMile(id);await loadHist(id);}});
document.getElementById("btnLogout").addEventListener("click",()=>{localStorage.removeItem(LS_USER);document.getElementById("loginName").value="";showScreen("screen-login");});

/* ===== スタッフPIN ===== */
const staffPinMsg=document.getElementById("staffPinMsg");
document.getElementById("btnStaffOpen").addEventListener("click",()=>{setMsg(staffPinMsg,"","");showScreen("screen-staffpin");});
document.getElementById("btnStaffBack").addEventListener("click",()=>showScreen("screen-login"));
document.getElementById("staffPin").addEventListener("keydown",e=>{if(e.key==="Enter")staffEnter();});
document.getElementById("btnStaffEnter").addEventListener("click",staffEnter);
async function staffEnter(){
  const pin=document.getElementById("staffPin").value.trim();
  if(pin!==MASTER_PIN){setMsg(staffPinMsg,"PINが違います","err");return;}
  document.getElementById("staffPin").value="";setMsg(staffPinMsg,"","");
  showScreen("screen-staff");
  await loadStaffNames();
  switchTab("active");
}
document.getElementById("btnStaffExit").addEventListener("click",()=>{stopScanner();showScreen("screen-login");});

/* スタッフ名 */
let currentStaff="";
async function loadStaffNames(){
  const sel=document.getElementById("staffSel");
  try{
    const {data,error}=await db.from("staff").select("*").order("sort_order",{ascending:true});
    if(error)throw error;
    sel.innerHTML='<option value="">選択してください</option>'+(data||[]).map(s=>'<option value="'+esc(s.name)+'">'+esc(s.name)+'</option>').join("");
    const saved=localStorage.getItem(LS_STAFF);
    if(saved&&(data||[]).some(s=>s.name===saved)){sel.value=saved;currentStaff=saved;}
  }catch(e){console.error(e);}
}
document.getElementById("staffSel").addEventListener("change",e=>{currentStaff=e.target.value;localStorage.setItem(LS_STAFF,currentStaff);});
function requireStaff(){if(!currentStaff){alert("先に画面上部で「操作スタッフ」を選択してください");return false;}return true;}

/* タブ切替 */
function switchTab(t){
  document.getElementById("tabActive").classList.toggle("active",t==="active");
  document.getElementById("tabMenu").classList.toggle("active",t==="menu");
  document.getElementById("panel-active").classList.toggle("active",t==="active");
  document.getElementById("panel-menu").classList.toggle("active",t==="menu");
  if(t==="active"){showActiveView("list");loadActive();}
  else{stopScanner();loadMenuMgr();}
}
document.getElementById("tabActive").addEventListener("click",()=>switchTab("active"));
document.getElementById("tabMenu").addEventListener("click",()=>switchTab("menu"));

/* ===== プレイ中（伝票）===== */
let menuCache=[];
function showActiveView(v){
  document.getElementById("viewList").style.display=v==="list"?"block":"none";
  document.getElementById("viewScan").style.display=v==="scan"?"block":"none";
  document.getElementById("viewTab").style.display=v==="tab"?"block":"none";
  document.getElementById("viewSettle").style.display=v==="settle"?"block":"none";
  if(v!=="scan")stopScanner();
}
async function loadActive(){
  const list=document.getElementById("activeList");
  try{
    const {data:tabs,error}=await db.from("tabs").select("*").eq("status","open").order("opened_at",{ascending:true});
    if(error)throw error;
    document.getElementById("activeCount").textContent=(tabs||[]).length;
    db.from("store_status").update({count:(tabs||[]).length,updated_at:new Date().toISOString()}).eq("id",1).then(()=>{});
    if(!tabs||!tabs.length){list.innerHTML='<div class="empty">プレイ中のお客様はいません。「＋QRで追加」から登録してください。</div>';return;}
    const ids=tabs.map(t=>t.id);
    const {data:ords}=await db.from("tab_orders").select("tab_id,price,qty").in("tab_id",ids);
    const sums={};(ords||[]).forEach(o=>{sums[o.tab_id]=(sums[o.tab_id]||0)+o.price*o.qty;});
    list.innerHTML=tabs.map(t=>{const d=new Date(t.opened_at);
      const tm=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+"開始";
      return '<div class="prow" onclick="openTab(\''+t.id+'\')"><div class="pn">'+esc(t.user_name)+'<small>'+tm+'</small></div><div class="pt">¥'+yen(sums[t.id]||0)+'</div></div>';
    }).join("");
  }catch(e){console.error(e);list.innerHTML='<div class="empty">読み込み失敗（接続設定をご確認ください）</div>';}
}

/* QRスキャン */
const video=document.getElementById("scanVideo"),canvas=document.getElementById("scanCanvas"),ctx=canvas.getContext("2d",{willReadFrequently:true});
const scanStat=document.getElementById("scanStat");
let stream=null,scanning=false,raf=null;
document.getElementById("btnScanOpen").addEventListener("click",()=>{if(!requireStaff())return;showActiveView("scan");startScanner();});
document.getElementById("btnScanBack").addEventListener("click",()=>{showActiveView("list");loadActive();});
async function startScanner(){
  scanStat.textContent="カメラ起動中…";
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});video.srcObject=stream;await video.play();scanning=true;scanStat.textContent="お客様のQRを枠内に";raf=requestAnimationFrame(scanLoop);}
  catch(e){console.error(e);scanStat.textContent="カメラを起動できません（HTTPS・権限をご確認ください）";}
}
function stopScanner(){scanning=false;if(raf){cancelAnimationFrame(raf);raf=null;}if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}video.srcObject=null;}
function scanLoop(){if(!scanning)return;if(video.readyState===video.HAVE_ENOUGH_DATA){canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctx.drawImage(video,0,0,canvas.width,canvas.height);const img=ctx.getImageData(0,0,canvas.width,canvas.height);const code=jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});if(code&&code.data){onQr(code.data.trim());return;}}raf=requestAnimationFrame(scanLoop);}
async function onQr(userId){
  scanning=false;if(raf){cancelAnimationFrame(raf);raf=null;}
  scanStat.textContent="読み取りました。確認中…";
  try{
    const {data:us}=await db.from("users").select("*").eq("id",userId).limit(1);
    if(!us||!us.length){scanStat.textContent="会員が見つかりません。2秒後に再開";setTimeout(resumeScan,2000);return;}
    const user=us[0];
    const {data:ex}=await db.from("tabs").select("*").eq("user_id",userId).eq("status","open").limit(1);
    let tab;
    if(ex&&ex.length)tab=ex[0];
    else{const {data:ins,error}=await db.from("tabs").insert({user_id:userId,user_name:user.name,opened_by:currentStaff,status:"open"}).select().limit(1);if(error)throw error;tab=ins[0];}
    stopScanner();
    openTab(tab.id);
  }catch(e){console.error(e);scanStat.textContent="エラー。2秒後に再開";setTimeout(resumeScan,2000);}
}
function resumeScan(){if(!stream){startScanner();return;}scanning=true;scanStat.textContent="お客様のQRを枠内に";raf=requestAnimationFrame(scanLoop);}

/* 伝票詳細 */
let curTab=null,curOrders=[];
async function openTab(tabId){
  showActiveView("tab");
  try{
    const {data:t}=await db.from("tabs").select("*").eq("id",tabId).limit(1);
    curTab=t[0];
    document.getElementById("tabWho").innerHTML=esc(curTab.user_name)+'<small>受付: '+esc(curTab.opened_by||"-")+'</small>';
    await loadMenuButtons();
    await loadOrders();
    setMsg(document.getElementById("tabMsg"),"","");
  }catch(e){console.error(e);}
}
window.openTab=openTab;
async function loadMenuButtons(){
  const {data}=await db.from("menu_items").select("*").eq("active",true).order("sort_order",{ascending:true});
  menuCache=data||[];
  document.getElementById("menuGrid").innerHTML=menuCache.map(m=>'<button class="mbtn" onclick="addOrder(\''+m.id+'\')">'+esc(m.name)+'<b>¥'+yen(m.price)+'</b></button>').join("");
}
async function loadOrders(){
  const {data}=await db.from("tab_orders").select("*").eq("tab_id",curTab.id).order("created_at",{ascending:true});
  curOrders=data||[];
  const w=document.getElementById("orderList");
  if(!curOrders.length)w.innerHTML='<div class="empty">注文はまだありません</div>';
  else w.innerHTML=curOrders.map(o=>'<div class="orow"><div class="on">'+esc(o.name)+' <small>担当: '+esc(o.staff_name||"-")+'</small></div><div class="op">¥'+yen(o.price*o.qty)+'</div><button class="od" onclick="delOrder(\''+o.id+'\')">×</button></div>').join("");
  const total=curOrders.reduce((s,o)=>s+o.price*o.qty,0);
  document.getElementById("tabTotal").textContent=yen(total);
}
async function addOrder(menuId){
  if(!requireStaff())return;
  const m=menuCache.find(x=>String(x.id)===String(menuId));if(!m)return;
  try{await db.from("tab_orders").insert({tab_id:curTab.id,name:m.name,price:m.price,qty:1,staff_name:currentStaff});await loadOrders();}
  catch(e){console.error(e);setMsg(document.getElementById("tabMsg"),"追加に失敗しました","err");}
}
window.addOrder=addOrder;
async function delOrder(id){
  if(!confirm("この注文を取り消しますか？"))return;
  try{await db.from("tab_orders").delete().eq("id",id);await loadOrders();}
  catch(e){console.error(e);alert("取り消しに失敗しました");}
}
window.delOrder=delOrder;
document.getElementById("btnTabBack").addEventListener("click",()=>{showActiveView("list");loadActive();});

/* マイル付与 */
document.getElementById("btnCharge").addEventListener("click",async()=>{
  if(!requireStaff())return;
  const v=prompt("付与するマイル数を入力してください");if(v===null)return;
  const amt=parseInt(v,10);if(!amt||amt<=0){alert("正しい数を入力してください");return;}
  try{await db.from("history").insert({user_id:curTab.user_id,action:"チャージ",amount:amt,staff_name:currentStaff});alert(curTab.user_name+" 様に "+yen(amt)+"pt 付与しました");}
  catch(e){console.error(e);alert("付与に失敗しました");}
});

/* ===== 精算 ===== */
let setTotalV=0,setValidV=0;
document.getElementById("btnSettle").addEventListener("click",openSettle);
async function openSettle(){
  if(!requireStaff())return;
  if(!curOrders.length){setMsg(document.getElementById("tabMsg"),"注文がありません","err");return;}
  setTotalV=curOrders.reduce((s,o)=>s+o.price*o.qty,0);
  document.getElementById("setWho").textContent=curTab.user_name;
  document.getElementById("setTotal").textContent=yen(setTotalV);
  let valid=0;
  try{const {data}=await db.rpc("mile_summary",{p_user:curTab.user_id});valid=(data&&data[0]&&data[0].valid)||0;}catch(e){console.error(e);}
  setValidV=valid;
  document.getElementById("setValid").textContent=yen(valid);
  const useM=Math.min(setTotalV,valid);
  document.getElementById("setMiles").value=useM;
  document.getElementById("setCash").value=Math.max(0,setTotalV-useM);
  setMsg(document.getElementById("setMsg"),"","");
  showActiveView("settle");
}
const setMilesEl=document.getElementById("setMiles"),setCashEl=document.getElementById("setCash");
setMilesEl.addEventListener("input",()=>{
  let m=parseInt(setMilesEl.value,10)||0;m=Math.max(0,Math.min(m,setValidV,setTotalV));setMilesEl.value=m;
  setCashEl.value=Math.max(0,setTotalV-m);
});
setCashEl.addEventListener("input",()=>{
  let c=parseInt(setCashEl.value,10)||0;c=Math.max(0,Math.min(c,setTotalV));setCashEl.value=c;
  let m=Math.min(setValidV,setTotalV-c);if(m<0)m=0;setMilesEl.value=m;
});
document.getElementById("btnSetBack").addEventListener("click",()=>showActiveView("tab"));
document.getElementById("btnSetCancel").addEventListener("click",()=>showActiveView("tab"));
document.getElementById("btnSetConfirm").addEventListener("click",confirmSettle);
async function confirmSettle(){
  if(!requireStaff())return;
  const useM=parseInt(setMilesEl.value,10)||0;
  const cash=parseInt(setCashEl.value,10)||0;
  const btn=document.getElementById("btnSetConfirm");btn.disabled=true;
  setMsg(document.getElementById("setMsg"),"処理中…","");
  try{
    if(useM>0){
      const {error:he}=await db.from("history").insert({user_id:curTab.user_id,action:"決済",amount:useM,staff_name:currentStaff});
      if(he)throw he;
    }
    const {error:te}=await db.from("tabs").update({status:"settled",settled_by:currentStaff,settled_at:new Date().toISOString(),total:setTotalV,miles_used:useM,cash_paid:cash}).eq("id",curTab.id);
    if(te)throw te;
    btn.disabled=false;
    setMsg(document.getElementById("setMsg"),"精算完了：マイル "+yen(useM)+"pt ／ 現金 ¥"+yen(cash),"ok");
    setTimeout(()=>{showActiveView("list");loadActive();},1400);
  }catch(e){console.error(e);btn.disabled=false;setMsg(document.getElementById("setMsg"),"精算に失敗しました","err");}
}

/* ===== メニュー管理 ===== */
let miEditing=null,menuMgrCache=[];
const miMsg=document.getElementById("miMsg");
async function loadMenuMgr(){
  const w=document.getElementById("menuList");
  try{
    const {data,error}=await db.from("menu_items").select("*").order("sort_order",{ascending:true});
    if(error)throw error;
    menuMgrCache=data||[];
    if(!data||!data.length){w.innerHTML='<div class="empty">メニューがありません。下から追加してください。</div>';return;}
    w.innerHTML=data.map(m=>'<div class="mitem"><span class="mn">'+esc(m.name)+'</span><span class="mp">¥'+yen(m.price)+'</span><button class="mini" onclick="miEdit(\''+m.id+'\')">編集</button><button class="mini del" onclick="miDelete(\''+m.id+'\')">削除</button></div>').join("");
  }catch(e){console.error(e);w.innerHTML='<div class="empty">読み込み失敗</div>';}
}
function miClear(){miEditing=null;document.getElementById("miFormTitle").textContent="メニューを追加";document.getElementById("miName").value="";document.getElementById("miPrice").value="";setMsg(miMsg,"","");}
function miEdit(id){const m=menuMgrCache.find(x=>String(x.id)===String(id));if(!m)return;miEditing=m.id;document.getElementById("miFormTitle").textContent="メニューを編集";document.getElementById("miName").value=m.name;document.getElementById("miPrice").value=m.price;setMsg(miMsg,"","");document.getElementById("miName").focus();}
window.miEdit=miEdit;
document.getElementById("miCancel").addEventListener("click",miClear);
document.getElementById("miSave").addEventListener("click",async()=>{
  const name=document.getElementById("miName").value.trim();
  const price=parseInt(document.getElementById("miPrice").value,10);
  if(!name){setMsg(miMsg,"メニュー名を入力してください","err");return;}
  if(isNaN(price)||price<0){setMsg(miMsg,"金額を正しく入力してください","err");return;}
  const btn=document.getElementById("miSave");btn.disabled=true;setMsg(miMsg,"保存中…","");
  try{
    if(miEditing){const {error}=await db.from("menu_items").update({name,price}).eq("id",miEditing);if(error)throw error;}
    else{const ord=menuMgrCache.reduce((m,x)=>Math.max(m,x.sort_order||0),0)+1;const {error}=await db.from("menu_items").insert({name,price,sort_order:ord});if(error)throw error;}
    btn.disabled=false;setMsg(miMsg,"保存しました ✓","ok");miClear();loadMenuMgr();
  }catch(e){console.error(e);btn.disabled=false;setMsg(miMsg,"保存に失敗しました","err");}
});
async function miDelete(id){if(!confirm("このメニューを削除しますか？"))return;try{await db.from("menu_items").delete().eq("id",id);loadMenuMgr();}catch(e){console.error(e);alert("削除に失敗しました");}}
window.miDelete=miDelete;

/* ===== 起動 ===== */
(async function init(){
  const id=localStorage.getItem(LS_USER);
  if(id){try{const {data}=await db.from("users").select("*").eq("id",id).limit(1);if(data&&data[0]){enterMember(data[0]);return;}}catch(e){console.error(e);}localStorage.removeItem(LS_USER);}
  showScreen("screen-login");
})();
document.addEventListener("visibilitychange",()=>{if(document.hidden)stopScanner();});
</script>
